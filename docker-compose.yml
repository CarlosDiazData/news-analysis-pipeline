services:
  postgres:
    image: postgres:14
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-airflow}
      POSTGRES_DB: airflow_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init_db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  pgadmin:
    # Pinned to 8.14 (2025-03 stable) to avoid breaking changes from floating `latest`.
    # Re-evaluate when pgAdmin 9.x reaches general availability.
    image: dpage/pgadmin4:8.14
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - "5050:80"
    volumes:
      - ./config/pgadmin/servers.json:/pgadmin4/servers.json
      - ./config/pgadmin/.pgpass:/pgpass  # pgAdmin reads this for password resolution
    depends_on:
      - postgres
    restart: unless-stopped

  airflow:
    build: .
    image: airflow-newsapi:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - AIRFLOW__CORE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:${POSTGRES_PASSWORD:-airflow}@postgres:5432/airflow_db
      - AIRFLOW__CORE__FERNET_KEY=${AIRFLOW_FERNET_KEY:-}
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:${POSTGRES_PASSWORD:-airflow}@postgres:5432/airflow_db
      - AIRFLOW_CONN_POSTGRES_DEFAULT=postgresql+psycopg2://airflow:${POSTGRES_PASSWORD:-airflow}@postgres:5432/airflow_db 
      - NEWS_API_KEY=${NEWS_API_KEY:-}
      - NEWS_API_COUNTRY=${NEWS_API_COUNTRY:-us}
      - NEWS_API_TOPIC=${NEWS_API_TOPIC:-}
      - USER_AGENT=${USER_AGENT:-NewsETL/1.0 (news-analysis-pipeline)}
      - MAX_SCRAPE_WORKERS=${MAX_SCRAPE_WORKERS:-4}
    volumes:
      - ./dags:/opt/airflow/dags
      - ./data:/opt/airflow/data
      - ./logs:/opt/airflow/logs
      - ./tests:/opt/airflow/tests
      - ./pyproject.toml:/opt/airflow/pyproject.toml:ro
    ports:
      - "8080:8080"
    command: >
      bash -c "
      airflow db migrate &&
      (airflow scheduler & airflow api-server)
      "
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/api/v2/monitor/health')\""]
      interval: 30s
      timeout: 30s
      retries: 5

volumes:
  postgres_data:
